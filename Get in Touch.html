<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact Us</title>
</head>

<body>
    <form action="">
        <h3>Get in Touch</h3>
        <p>Fill out the form below and we'll get back to you as soon as possible.</p> <br><br>
        <label for="">Name</label><br>
        <input type="text" name="" id="" placeholder="Your name"> <br><br>
        <label for="">Email</label><br>
        <input type="email" name="" id="" placeholder="Your email"><br><br>
        <label for="">Phone</label><br>
        <input type="tel" name="" id="" placeholder="+123456"><br><br>
        <label for="">Message</label><br>
        <textarea name="" id="">Your message</textarea><br><br><br>
        <input type="Submit" value="Send Message" </form>
</body>

</html>
